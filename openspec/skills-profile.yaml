# Skills Profile
#
# Independent skill suggestions for each workflow step.
# Schemas reference this file; edit skills freely without changing schema.yaml.
#
# ## How to Use
#
# 1. Add entries under `suggestions:` using key format:
#    `schema-id.artifact-id` (e.g., spec-driven-enhanced.tasks)
#    `exploration` for the /opsx:explore step
#
# 2. Each entry: name, source (community/local/built-in), url (for community),
#    when (before_creation/after_creation/during), description
#
# 3. Skills are SUGGESTIONS only — AI or user decides whether to load them
#
# 4. This file changes independently of schema.yaml — experiment freely
#
# ## UX Reminder
#
# When presenting skill choices to the user, always include
# "None — skip skill loading" and "Other — write your own" as options.

suggestions:
  # Evaluate-scale — diagnostic read-only assessment
  mvp-evaluate-scale:
    - name: mvp-evaluate-scale
      source: local
      when: during
      description: "Diagnose project scale using filesystem signals + user interview"

  # Exploration — when using /opsx:explore
  exploration:
    - name: grill-me
      source: community
      when: during
      description: "Rigorously challenge ideas, assumptions, and scope"

    - name: brainstorm
      source: community
      when: during
      description: "Explore alternative approaches before committing"

  # project-profile schema
  project-profile.proposal:
    - name: brainstorm
      source: community
      when: before_creation
      description: "Explore alternative approaches before committing"

  # mvp-init-profile — orchestrated profile creation
  mvp-init-profile:
    - name: mvp-init-profile
      source: local
      when: during
      description: "Bootstrap project-profile from conversation or existing code"

    # Example: local skill from .opencode/skills/my-reviewer
    # - name: my-reviewer
    #   source: local
    #   when: after_creation
    #   description: "Internal architecture review checklist"

    # Example: built-in OpenSpec skill
    # - name: explore
    #   source: built-in
    #   when: before_creation
    #   description: "Explore the problem space before proposing"

  project-profile.constitution:
    - name: security-audit
      source: community
      when: after_creation
      description: "Review constitution for security policy gaps"

  # epic schema
  epic.epic:
    - name: brainstorm
      source: community
      when: before_creation
      description: "Explore initiative scope and slice boundaries"

  # mvp-create-epic — orchestrated epic creation
  mvp-create-epic:
    - name: mvp-create-epic
      source: local
      when: during
      description: "Create an epic with vertical slice decomposition"

  # vertical-slice schema
  vertical-slice.slice-proposal:
    - name: grill-me
      source: community
      when: after_creation
      description: "Challenge whether this slice is correctly scoped"

  vertical-slice.change-manifest:
    - name: system-design
      source: community
      when: after_creation
      description: "Review contract stubs for completeness"

  # mvp-create-slice — orchestrated slice creation
  mvp-create-slice:
    - name: mvp-create-slice
      source: local
      when: during
      description: "Create a vertical-slice change with auto-scaffolded child changes"

  # mvp-apply-slice — orchestrated slice implementation
  mvp-apply-slice:
    - name: mvp-apply-slice
      source: local
      when: during
      description: "Apply all child changes from a slice change-manifest in order"

  # spec-driven-enhanced schema
  spec-driven-enhanced.proposal:
    - name: grill-me
      source: community
      when: after_creation
      description: "Challenge scope boundaries and assumptions"

  spec-driven-enhanced.design:
    - name: system-design
      source: community
      when: after_creation
      description: "Review design for architectural soundness"

  spec-driven-enhanced.tasks:
    - name: tdd
      source: community
      when: during
      description: "Write tests before implementation"

  spec-driven-enhanced.verification:
    - name: security-audit
      source: community
      when: during
      description: "Verify no security regressions"

  # external-ingest schema
  external-ingest.gap-analysis:
    - name: system-design
      source: community
      when: after_creation
      description: "Review integration risks from a system design perspective"

  # mvp-ingest — orchestrated document ingestion
  mvp-ingest:
    - name: mvp-ingest
      source: local
      when: during
      description: "Ingest external docs into BDD shadow specs with gap analysis"

  # mvp-reverse — orchestrated code reverse engineering
  mvp-reverse:
    - name: mvp-reverse
      source: local
      when: during
      description: "Reverse-engineer behavioral specs from undocumented source code"

  # project-upgrade schema
  project-upgrade.upgrade-plan:
    - name: system-design
      source: community
      when: during
      description: "Review migration plan for architectural soundness"

  project-upgrade.upgrade-verification:
    - name: grill-me
      source: community
      when: after_creation
      description: "Challenge whether the upgrade truly passed all checks"

  # mvp-upgrade — orchestrated scale migration
  mvp-upgrade:
    - name: mvp-upgrade
      source: local
      when: during
      description: "Upgrade project scale with verification gate"

  # mvp-audit — structural drift detection
  mvp-audit:
    - name: mvp-audit
      source: local
      when: during
      description: "Scan project structure for standalone items and propose hierarchy fixes"

  # mvp-organize — structural repair
  mvp-organize:
    - name: mvp-organize
      source: local
      when: during
      description: "Execute structural reorganization: merge items into existing containers or create new ones"
  code-to-spec.reverse-engineering:
    - name: code-review
      source: community
      when: during
      description: "Review code for behavioral patterns"
